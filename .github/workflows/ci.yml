name: Backend Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{secrets.JWT_SECRET}}
      MONGO_URI: ${{secrets.MONGO_URI}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run test
        run: pnpm test
