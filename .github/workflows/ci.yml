name: MERN CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      JWT_SECRET: ${{secrets.JWT_SECRET}}
      MONGO_URI: ${{secrets.MONGO_URI}}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Backend Tests
        run: pnpm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        run: pnpm build

  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    needs:
      - backend-test
      - frontend-build

    env:
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t rd1wakar/mern-demo-backend:${TAG} \
            -t rd1wakar/mern-demo-backend:latest \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t rd1wakar/mern-demo-frontend:${TAG} \
            -t rd1wakar/mern-demo-frontend:latest \
            ./frontend

      - name: Push Backend Images
        run: |
          docker push rd1wakar/mern-demo-backend:${TAG}
          docker push rd1wakar/mern-demo-backend:latest

      - name: Push Frontend Images
        run: |
          docker push rd1wakar/mern-demo-frontend:${TAG}
          docker push rd1wakar/mern-demo-frontend:latest
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    needs:
      - docker-build

    env:
      TAG: ${{ github.sha }}

    steps:
      - name: Deploy Application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/cicd-app 

            export TAG=${{ github.sha }}

            docker compose pull 

            docker compose up -d 

            docker image prune -af
